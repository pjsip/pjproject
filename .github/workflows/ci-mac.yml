        chmod +x tests/pjsua/tools/visqol
    - name: config site
      run: cd pjlib/include/pj && cp config_site_test.h config_site.h && echo -e "#define PJ_IOQUEUE_CALLBACK_NO_LOCK 0\n" >> config_site.h
    - name: configure
      run: CFLAGS="-g $(pkg-config --cflags openssl) $(pkg-config --cflags opencore-amrnb) -fPIC" LDFLAGS="$(pkg-config --libs-only-L openssl) $(pkg-config --libs-only-L opencore-amrnb)" CXXFLAGS="-g -fPIC" ./configure
    - name: make
      run: $MAKE_FAST
    - name: disable firewall
      run: sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate off
    - name: pjlib-test
      run: cd pjlib/build && ../bin/pjlib-test-`make -s -C ../.. infotarget` $CI_MODE $CI_ARGS udp_ioqueue_test tcp_ioqueue_test ioqueue_stress_test udp_ioqueue_unreg_test ioqueue_perf_test0 ioqueue_perf_test1 activesock_test ssl_sock_test iocp_unregister_test
    - name: pjsip-test
      run: cd pjsip/build && ../bin/pjsip-test-`make -s -C ../.. infotarget` $CI_ARGS resolve_test inv_offer_answer_test transport_udp_test transport_tcp_test regc_test tsx_destroy_test
    - name: pjsua-test
      run: make pjsua-test
    - name: upload artifacts on failure
      if: ${{ failure() }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ github.run_id }}
        path: artifacts

  cmake-build:
    runs-on: macos-latest
    name: CMake / Debug+Release
    steps:
    - uses: actions/checkout@v4
    - name: install dependencies
      run: brew install openssl
    - name: configure Debug
      run: cmake -B build-debug -DCMAKE_BUILD_TYPE=Debug
    - name: build Debug
      run: cmake --build build-debug -j $(sysctl -n hw.ncpu)
    - name: check Debug
      run: |
        file build-debug/pjsip-apps/pjsua
        otool -L build-debug/pjsip-apps/pjsua
    - name: configure Release
      run: cmake -B build-release -DCMAKE_BUILD_TYPE=Release
    - name: build Release
      run: cmake --build build-release -j $(sysctl -n hw.ncpu)
    - name: check Release
      run: |
        file build-release/pjsip-apps/pjsua
        otool -L build-release/pjsip-apps/pjsua
    - name: install Release
      run: cmake --install build-release --prefix ${{ runner.temp }}/pj-install
    - name: test find_package
      run: |
        cmake -B build-consumer tests/cmake \
          -DCMAKE_PREFIX_PATH=${{ runner.temp }}/pj-install \
          -DCMAKE_BUILD_TYPE=Release
        cmake --build build-consumer --verbose
        ./build-consumer/test_consumer
        ./build-consumer/test_consumer2
