name: CI MacOS
on:
  push:
    branches:
      - 'master'
  pull_request:
    types: [opened, synchronize, reopened]
env:
  CI_ARGS: -w 2 --shuffle --stdout-buf 1
  CI_MODE: --ci-mode
  # Setting CI_RUNNER to empty should disable cirunner
  CI_RUNNER: python ${{ github.workspace }}/cirunner/cirunner.py -t 3600 -o ${{ github.workspace }}/artifacts --
  MAKE_FAST: make -j 2
  # Workaround for Apple clang ASan bugs on macOS ARM64 (Sequoia):
  # 1. use_sigaltstack=0: sigaltstack(SS_DISABLE) fails during thread exit:
  #      CHECK failed: sanitizer_posix_libcdep.cpp "((0)) == ((sigaltstack(...)))"
  # 2. detect_stack_use_after_return=0: PlatformUnpoisonStacks() crashes when
  #    longjmp is used in non-main threads (e.g. SIP parser error recovery via
  #    pj_throw_exception_ -> pj_longjmp). ASan intercepts longjmp at runtime
  #    and fails to determine worker thread stack bounds (addr=0x0):
  #      CHECK failed: asan_poisoning.cpp "((AddrIsInMem(...))) != (0)" (0x0, 0x0)
  # Only affects ASan-instrumented binaries; harmless for non-ASan jobs.
  ASAN_OPTIONS: use_sigaltstack=0:detect_stack_use_after_return=0
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      # macOS-specific code lives in pjlib (OS abstractions, ioqueue/kqueue,
      # sockets, threading, SSL) and pjmedia (audio/video devices, native
      # codecs, AEC). Other components (pjlib-util, pjnath, pjsip, pjsip-apps)
      # are platform-independent protocol logic already covered by Linux CI.
      # Only run full Mac test suite for changes to platform-specific areas.
      mac_full_tests: ${{ steps.filter.outputs.core == 'true' || steps.filter.outputs.pjmedia == 'true' || steps.filter.outputs.tests == 'true' || steps.filter.outputs.ci == 'true' }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          core:
            - 'pjlib/**'
            - 'build/**'
            - 'configure*'
            - 'aconfigure*'
            - 'Makefile'
            - '*.mak*'
            - 'third_party/**'
          pjlib_util:
            - 'pjlib-util/**'
          pjnath:
            - 'pjnath/**'
          pjmedia:
            - 'pjmedia/**'
          pjsip:
            - 'pjsip/**'
          pjsip_apps:
            - 'pjsip-apps/**'
          tests:
            - 'tests/**'
          ci:
            - '.github/**'

  default-build:
    # checking pure lib source distribution with plain configure & make
    runs-on: macos-latest
    name: Default / build only
    steps:
    - uses: actions/checkout@v2
    - name: install cirunner
      run: |
        git clone --depth 1 https://github.com/pjsip/cirunner.git
        cirunner/installmac.sh
    - name: config site
      run: echo -e "#define PJ_TODO(x)\n" > pjlib/include/pj/config_site.h
    - name: configure
      run: ./configure
    - name: make
      run: $MAKE_FAST
    - name: upload artifacts on failure
      if: ${{ failure() }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ github.run_id }}
        path: artifacts

  default-pjlib-util-pjmedia-pjnath:
    # full bundle: enable all codecs + AEC + DTLS
    needs: [detect-changes]
    if: github.event_name == 'push' || needs.detect-changes.outputs.mac_full_tests == 'true'
    runs-on: macos-latest
    name: Default / pjmedia,pjnath
    steps:
    - uses: actions/checkout@v2
    - name: install cirunner
      run: |
        git clone --depth 1 https://github.com/pjsip/cirunner.git
        cirunner/installmac.sh
    - name: install dependencies
      run: brew install openssl opencore-amr
    - name: config site
      run: cd pjlib/include/pj && cp config_site_test.h config_site.h
    - name: configure
      run: CFLAGS="-g $(pkg-config --cflags openssl) $(pkg-config --cflags opencore-amrnb) -fPIC" LDFLAGS="$(pkg-config --libs-only-L openssl) $(pkg-config --libs-only-L opencore-amrnb)" CXXFLAGS="-g -fPIC" ./configure --enable-libwebrtc-aec3
    - name: make
      run: $MAKE_FAST
    - name: disable firewall
      run: sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate off
    - name: pjmedia-test
      run: make pjmedia-test
    - name: pjnath-test
      run: make pjnath-test
    - name: upload artifacts on failure
      if: ${{ failure() }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ github.run_id }}
        path: artifacts

  default-pjsua-test:
    needs: [detect-changes]
    if: github.event_name == 'push' || needs.detect-changes.outputs.mac_full_tests == 'true'
    runs-on: macos-latest
    name: Default / pjsua-test
    steps:
    - uses: actions/checkout@v2
    - name: install cirunner
      run: |
        git clone --depth 1 https://github.com/pjsip/cirunner.git
        cirunner/installmac.sh
    - name: install dependencies
      run: brew install openssl opencore-amr swig sipp
    - name: set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install PESQ and Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install numpy cython
        python -m pip install pesq scipy
    - name: Download and Unzip Visqol
      run: |
        curl -L "https://github.com/pjsip/third_party_libs/raw/main/visqol_mac.zip" -o visqol.zip
        unzip -o visqol.zip -d tests/pjsua/tools
        chmod +x tests/pjsua/tools/visqol
    - name: config site
      run: cd pjlib/include/pj && cp config_site_test.h config_site.h
    - name: configure
      run: CFLAGS="-g $(pkg-config --cflags openssl) $(pkg-config --cflags opencore-amrnb) -fPIC" LDFLAGS="$(pkg-config --libs-only-L openssl) $(pkg-config --libs-only-L opencore-amrnb)" CXXFLAGS="-g -fPIC" ./configure
    - name: make
      run: $MAKE_FAST
    - name: disable firewall
      run: sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate off
    - name: swig bindings
      run: cd pjsip-apps/src/swig && make
    - name: pjsua-test
      run: make pjsua-test
    - name: upload artifacts on failure
      if: ${{ failure() }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ github.run_id }}
        path: artifacts

  default-pjsip-test:
    needs: [detect-changes]
    if: github.event_name == 'push' || needs.detect-changes.outputs.mac_full_tests == 'true'
    runs-on: macos-latest
    name: Default / pjlib,util,pjsip-test
